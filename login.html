<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Lavanderia Login</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>

    <!-- Caixa principal -->
    <div class="caixaPrincipal">


        <!-- Lado esquerdo -->
        <div class="ladoEsquerdo">

            <h1>Bem-vindo de <br> volta!</h1>

            <p>Ficamos felizes em te ver novamente</p>

        </div>


        <!-- Formulário -->
        <div class="formulario">

            <h2>Login</h2>

            <!-- Campo usuário -->
            <input type="text" placeholder="Usuário ou email">

            <!-- Campo senha -->
            <input type="password" placeholder="Senha">


            <!-- Opções -->
            <div class="opcaoLogin">

                <label>

                    <input type="checkbox">

                    Lembre de mim

                </label>

                <a href="#">Esqueceu a senha?</a>

            </div>


            <!-- Botões -->
            <div class="botoes">

                <a href="suporte.html" class="cadastrar">
    Suporte
</a>


                <button class="login">

                    Avançar

                </button>

            </div>


            <!-- Criar conta -->
            <p class="novaConta">
    Novo aqui? <span><a href="cadastro.html">Crie uma Conta</a></span>
</p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
